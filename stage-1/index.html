<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage 1 — Trainer Card</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header>
    <h1>TRAINER CARD</h1>
    <div id="trainer-info"></div>
  </header>

  <main>
    <div class="battle-row">

      <!-- LADO DEL JUGADOR -->
      <section id="player-side">
        <h2>Your Pokémon</h2>
        <div id="player-content"></div>
      </section>

      <!-- LADO DEL OPONENTE -->
      <section id="opponent-side">
        <h2>Opponent</h2>
        <input
          type="text"
          id="opponent-search"
          placeholder="Search a Pokémon..."
          autocomplete="off"
        >
        <div id="search-error"></div>
        <div id="opponent-content">
          <p>Search for an opponent above.</p>
        </div>
      </section>

    </div>

    <button id="go-battle-btn" disabled>Go to Battle</button>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
